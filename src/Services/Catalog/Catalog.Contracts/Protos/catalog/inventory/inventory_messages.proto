syntax = "proto3";

option csharp_namespace = "Catalog.Contracts.Grpc.Inventory";

package catalog.inventory.v1;

message GetStockItemByProductIdRequest {
  string product_id = 1;
}

message StockItemReply {
  string product_id = 1;
  int32 quantity_on_hand = 2;
  int32 reserved_quantity = 3;
  int32 available_quantity = 4;
}

message CreateStockItemRequest {
  string product_id = 1;
}

message CreateStockItemReply {
  string product_id = 1;
}