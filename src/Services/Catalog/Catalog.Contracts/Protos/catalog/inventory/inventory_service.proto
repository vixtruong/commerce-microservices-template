syntax = "proto3";

option csharp_namespace = "Catalog.Contracts.Grpc.Inventory";

package catalog.inventory.v1;

import "catalog/inventory/inventory_messages.proto";

service InventoryGrpc {
  rpc GetStockItemByProductId(GetStockItemByProductIdRequest) returns (StockItemReply);
  rpc CreateStockItem(CreateStockItemRequest) returns (CreateStockItemReply);
}
